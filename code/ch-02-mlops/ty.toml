[environment]
python-version = "3.12"

[rules]
possibly-unresolved-reference = "warn"
division-by-zero = "ignore"
unresolved-import = "ignore"

[analysis]
replace-imports-with-any = ["pandas.**", "numpy.**", "sklearn.**", "sagemaker.**", "mlflow.**", "fastwoe.**", "xgboost.**"]
respect-type-ignore-comments = false

Diagram:
  DefinitionFiles:
    - Type: LocalFile
      LocalFile: /Users/deburky/.claude/skills/aws-diagram/definition-for-aws-icons-light.yaml

  Resources:
    Canvas:
      Type: AWS::Diagram::Canvas
      Direction: horizontal
      Children: [Developer, AWSCloud]

    Developer:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "Data scientist"

    AWSCloud:
      Type: AWS::Diagram::Cloud
      Preset: AWSCloudNoLogo
      Direction: horizontal
      Children: [Git, CodeBuild, ECR, Training, MLflow, Endpoint]

    Git:
      Type: AWS::Diagram::Resource
      Preset: "Git repository"
      Title: "Git repo"
    CodeBuild:
      Type: AWS::Diagram::Resource
      Preset: "AWS CodeBuild"
      Title: "CodeBuild"
    ECR:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Elastic Container Registry (Amazon ECR)"
      Title: "ECR image (BYOC)"
    Training:
      Type: AWS::Diagram::Resource
      Preset: "Amazon SageMaker AI"
      Title: "Training job"
    MLflow:
      Type: AWS::Diagram::Resource
      Preset: "Amazon SageMaker AI"
      Title: "MLflow App\n(tracking + registry)"
    Endpoint:
      Type: AWS::Diagram::Resource
      Preset: "Amazon SageMaker AI"
      Title: "Serverless endpoint"

  Links:
    - {Source: Developer, SourcePosition: E, Target: Git, TargetPosition: W, TargetArrowHead: {Type: Open}, Type: orthogonal}
    - {Source: Git, SourcePosition: E, Target: CodeBuild, TargetPosition: W, TargetArrowHead: {Type: Open}, Type: orthogonal}
    - {Source: CodeBuild, SourcePosition: E, Target: ECR, TargetPosition: W, TargetArrowHead: {Type: Open}, Type: orthogonal}
    - {Source: ECR, SourcePosition: E, Target: Training, TargetPosition: W, TargetArrowHead: {Type: Open}, Type: orthogonal}
    - {Source: Training, SourcePosition: E, Target: MLflow, TargetPosition: W, TargetArrowHead: {Type: Open}, Type: orthogonal}
    - {Source: MLflow, SourcePosition: E, Target: Endpoint, TargetPosition: W, TargetArrowHead: {Type: Open}, Type: orthogonal}
